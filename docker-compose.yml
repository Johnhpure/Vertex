services:
  vertex-proxy:
    build: .
    container_name: vertex-proxy
    restart: unless-stopped
    ports:
      - "192.168.1.6:20200:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ENCRYPTION_KEY=your_64_hex_char_encryption_key_here
      - VERTEX_LOCATION=global
      - CLOUD_PROJECT_ID=your_gcp_project_id_here
      - GOOGLE_APPLICATION_CREDENTIALS=/app/backend/config/service-account.json
    volumes:
      - ./data:/app/data
      - ./backend/config/service-account.json:/app/backend/config/service-account.json:ro
    networks:
      - vertex-network

networks:
  vertex-network:
    driver: bridge
